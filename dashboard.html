<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
padding:20px;
}

h1{
text-align:center;
}

.top{
text-align:center;
margin-bottom:20px;
}

#products{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
}

.card{
background:white;
padding:20px;
width:250px;
border-radius:10px;
box-shadow:0 0 5px gray;
}

button{
padding:10px;
background:green;
color:white;
border:none;
cursor:pointer;
border-radius:5px;
}

</style>

</head>

<body>

<h1>Products Dashboard</h1>

<div class="top">
<a href="cart.html">
<button>View Cart</button>
</a>
</div>

<div id="products"></div>

<script>

async function loadProducts(){

const response = await fetch(
"http://localhost:5000/api/products"
);

const products = await response.json();

let output = "";

products.forEach(product => {

output += `
<div class="card">

<h3>${product.name}</h3>

<p><b>Price :</b> ₹${product.price}</p>

<p>${product.description}</p>

<button onclick="addToCart('${product.name}', ${product.price})">
Add To Cart
</button>

</div>
`;

});

document.getElementById("products").innerHTML = output;

}

function addToCart(name, price){

let cart = JSON.parse(
localStorage.getItem("cart")
) || [];

cart.push({
name: name,
price: price
});

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

alert("Product Added To Cart");

}

loadProducts();

</script>

</body>
</html>
