<!DOCTYPE html>
<html>
<head>
<title>My Cart</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

h1{
text-align:center;
}

.cart-item{
background:white;
padding:15px;
margin:10px;
border-radius:10px;
box-shadow:0 0 5px gray;
}

button{
padding:10px;
background:green;
color:white;
border:none;
cursor:pointer;
border-radius:5px;
}

.total{
font-size:20px;
font-weight:bold;
text-align:center;
margin-top:20px;
}

</style>

</head>

<body>

<h1>My Cart</h1>

<div id="cartItems"></div>

<div class="total" id="total"></div>

<center>
<a href="orders.html">
<button>Place Order</button>
</a>
</center>

<script>

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

let output = "";
let total = 0;

cart.forEach(item => {

total += item.price;

output += `
<div class="cart-item">

<h3>${item.name}</h3>

<p>Price : ₹${item.price}</p>

</div>
`;

});

document.getElementById("cartItems").innerHTML = output;

document.getElementById("total").innerHTML =
"Total Amount : ₹" + total;

</script>

</body>
</html>
